<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Как искать идеи</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --mist:#F2EFEC;
    --paper:#FAF8F6;
    --ink:#2B2733;
    --ink-soft:#453F4C;
    --plum:#6B4F6B;
    --rose-ink:#9C5D66;
    --teal-ink:#4C766D;
    --line:rgba(43,39,51,0.12);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--mist);
    color:var(--ink);
    font-family:'Karla', system-ui, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  .card{
    max-width:440px;
    width:100%;
  }
  .kicker{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 14px;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:2.4rem;
    line-height:1.15;
    margin:0 0 14px;
    background:linear-gradient(100deg, var(--plum) 0%, var(--rose-ink) 45%, var(--teal-ink) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:var(--plum);
  }
  .subtitle{
    font-size:1rem;
    color:var(--ink-soft);
    margin:0 0 32px;
    line-height:1.55;
    max-width:40ch;
  }
  .menu a{
    display:block;
    padding:16px 20px;
    margin-bottom:12px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--plum);
    text-decoration:none;
    font-weight:600;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .menu a:hover{ border-color:var(--plum); box-shadow:0 2px 14px rgba(43,39,51,0.06); }
  .authors{
    margin:28px 0 0;
    padding-top:20px;
    border-top:1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.02em;
    color:var(--ink-soft);
    line-height:1.7;
  }
  .authors a{
    color:var(--teal-ink);
    text-decoration:none;
    font-weight:600;
  }
  .authors a:hover{ color:var(--plum); text-decoration:underline; }
</style>
</head>
<body>
  <div class="card">
    <p class="kicker">Меню</p>
    <h1>Как искать идеи</h1>
    <p class="subtitle">Интерактивные материалы о том, откуда берутся темы, вопросы и тексты — и как их находить, когда чистый лист пугает.</p>

    </div>
    <p class="authors">Авторы проекта в Telegram: <a href="https://t.me/chtotonapsy" target="_blank" rel="noopener">@chtotonapsy</a> и <a href="https://t.me/unconsciousjourney" target="_blank" rel="noopener">@unconsciousjourney</a></p>
  </div>
<script src="telegram-app.js"></script>
</body>
</html>
