<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека возможных тем</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2EFEC;
    --bg2: #FAF8F6;
    --ink: #2B2733;
    --ink-dim: #453F4C;
    --accent: #6B4F6B;
    --accent-soft: #4C766D;
    --card-bg: #FAF8F6;
    --card-border: rgba(43,39,51,0.12);
    --rose: #C98D93;
    --rose-ink: #9C5D66;
    --teal: #6E9C93;
    --sage: #8FA37E;
    --bluebell: #7C93B0;
    --lavender: #9B8FB0;
    --dusty: #B0A18F;
    --wc-1: #A3835C;
    --wc-2: #7DA35C;
    --wc-3: #5CA395;
    --wc-4: #5C7CA3;
    --wc-5: #765CA3;
    --wc-6: #A35CA3;
    --wc-7: #A35C63;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--bg2), var(--bg) 70%);
    color: var(--ink);
    font-family: 'Karla', system-ui, sans-serif;
    min-height: 100vh;
  }
  .home-link {
    display: inline-block;
    margin: 24px 0 0 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-dim);
  }
  .home-link:before { content: "← "; }
  .home-link:hover { color: var(--accent); }
  .intro {
    text-align: center;
    padding: 48px 24px 12px;
  }
  .intro h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    letter-spacing: 0.1em;
    font-size: clamp(28px, 5vw, 44px);
    margin: 0 0 12px;
    text-transform: uppercase;
    background: linear-gradient(100deg, var(--accent) 0%, var(--rose-ink) 50%, var(--accent-soft) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--accent);
  }
  .intro p {
    color: var(--ink-dim);
    font-size: 15px;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
    font-style: italic;
  }
  #wall {
    max-width: 1100px;
    margin: 32px auto 80px;
    padding: 40px 5vw;
    line-height: 1.15;
    text-align: left;
    word-spacing: 0;
  }
  .word {
    display: inline;
    cursor: pointer;
    white-space: nowrap;
    transition: color .2s ease, background .2s ease;
    letter-spacing: 0.02em;
    font-size: 22px;
    font-weight: 600;
    opacity: 1;
    color: var(--ink);
  }
  .word:nth-of-type(7n+1) { color: var(--wc-1); }
  .word:nth-of-type(7n+2) { color: var(--wc-2); }
  .word:nth-of-type(7n+3) { color: var(--wc-3); }
  .word:nth-of-type(7n+4) { color: var(--wc-4); }
  .word:nth-of-type(7n+5) { color: var(--wc-5); }
  .word:nth-of-type(7n+6) { color: var(--wc-6); }
  .word:nth-of-type(7n+7) { color: var(--wc-7); }
  .word:hover {
    color: var(--accent) !important;
  }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(43,39,51,0.45);
    backdrop-filter: blur(6px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    overflow-y: auto;
    padding: 6vh 16px;
  }
  #overlay.open { display: flex; }
  #panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    max-width: 720px;
    width: 100%;
    padding: 40px 36px 48px;
    box-shadow: 0 30px 90px rgba(43,39,51,0.18);
    animation: rise .35s ease;
  }
  @keyframes rise {
    from { transform: translateY(24px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  #panel h2 {
    font-family: 'Cormorant Garamond', serif;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    font-size: 30px;
    font-weight: 600;
    margin: 0 0 6px;
    text-align: center;
  }
  #panel .sub {
    text-align: center;
    color: var(--ink-dim);
    font-style: italic;
    font-size: 13px;
    margin-bottom: 30px;
  }
  .close-btn {
    position: sticky;
    top: 0;
    float: right;
    background: none;
    border: 1px solid var(--card-border);
    color: var(--ink-dim);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .close-btn:hover { color: var(--accent); border-color: var(--accent); }
  .card {
    border-top: 1px solid var(--card-border);
    padding: 22px 0;
  }
  .card:first-of-type { border-top: none; }
  .card .domain {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 11px;
    color: var(--accent-soft);
    margin-bottom: 8px;
  }
  .card .material {
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 3px;
    font-weight: 600;
  }
  .card .type {
    font-size: 12px;
    color: var(--ink-dim);
    font-style: italic;
    margin-bottom: 12px;
  }
  .card .about, .card .connection {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 10px;
    white-space: pre-line;
  }
  .card .connection { color: var(--ink-dim); }
  .card .question {
    font-size: 14px;
    font-style: italic;
    color: var(--accent);
    margin-top: 10px;
    padding-left: 14px;
    border-left: 2px solid var(--accent-soft);
  }
  .card a {
    color: var(--accent);
    font-size: 12.5px;
    text-decoration: none;
    border-bottom: 1px dotted var(--accent-soft);
  }
  .card a:hover { border-bottom-style: solid; }
  .search-wrap {
    text-align: center;
    margin: 0 auto 8px;
    padding: 0 24px;
  }
  #search {
    width: 100%;
    max-width: 360px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--card-border);
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    font-size: 16px;
    padding: 8px 4px;
    text-align: center;
    letter-spacing: 0.04em;
    outline: none;
    transition: border-color .2s ease;
  }
  #search:focus { border-bottom-color: var(--accent); }
  #search::placeholder { color: var(--ink-dim); font-style: italic; }
  .word.highlight {
    background: var(--accent);
    color: var(--bg2) !important;
    opacity: 1 !important;
    border-radius: 3px;
    padding: 0 2px;
    box-shadow: 0 0 14px rgba(107,79,107,0.35);
  }
  .hint {
    text-align: center;
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 0.08em;
    margin-top: -8px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  #domain-list {
    list-style: none;
    margin: 0; padding: 0;
  }
  #domain-list li {
    border-top: 1px solid var(--card-border);
    padding: 16px 4px;
    cursor: pointer;
    font-size: 17px;
    color: var(--ink);
    transition: color .2s ease, padding-left .2s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #domain-list li:first-child { border-top: none; }
  #domain-list li:hover {
    color: var(--accent);
    padding-left: 10px;
  }
  #domain-list li .dname {
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #domain-list li .arrow {
    color: var(--accent-soft);
    font-size: 15px;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 18px;
    padding: 0;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn:before {
    content: "← ";
  }
  ::selection { background: var(--accent-soft); color: var(--bg2); }
  .page-nav {
    max-width: 1100px;
    margin: 0 auto 40px;
    padding: 0 5vw;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-dim);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 16px;
    transition: color .2s ease, border-color .2s ease;
  }
  .page-nav a:hover { color: var(--accent); border-color: var(--accent); }
  footer {
    max-width: 1100px;
    margin: 0 auto 60px;
    padding: 20px 5vw 0;
    border-top: 1px solid var(--card-border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
  }
  @media (max-width: 600px) {
    #wall { padding: 24px 4vw; }
    .word { font-size: 15px; }
    #panel { padding: 28px 20px 36px; }
  }
</style>
<body>

<a href="index.html" class="home-link">На главную</a>

<div class="intro">
  <h1>Библиотека возможных тем</h1>
  <p>Позвольте взгляду блуждать. Первые слова, на которых он остановится — и есть тема.</p>
</div>

<div class="search-wrap">
  <input id="search" type="text" placeholder="Найти слово…" autocomplete="off">
</div>

<div id="wall"></div>

<div class="page-nav">
  <span></span>
  <a href="issledovatelskiy-vopros.html">Часть 2 · Исследовательские вопросы →</a>
</div>
<footer>Раздатка к семинару · часть 1 из 4</footer>

<div id="overlay">
  <div id="panel">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <div id="panel-body"></div>
  </div>
</div>

<script src="biblioteka-data.js"></script>
<script>
const DATA = LIBRARY_DATA;
const WORDS = LIBRARY_WORDS;

function buildWall() {
  const wall = document.getElementById('wall');
  const frag = document.createDocumentFragment();
  WORDS.forEach((w) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = w;
    span.dataset.word = w;
    span.onclick = () => openPanel(w);
    frag.appendChild(span);
    frag.appendChild(document.createElement('wbr'));
  });
  wall.appendChild(frag);
}

function setupSearch() {
  const input = document.getElementById('search');
  let scrolledTo = null;
  input.addEventListener('input', () => {
    const q = input.value.trim().toUpperCase();
    const words = document.querySelectorAll('#wall .word');
    let firstMatch = null;
    words.forEach(el => {
      const isMatch = q.length > 0 && el.dataset.word.includes(q);
      el.classList.toggle('highlight', isMatch);
      if (isMatch && !firstMatch) firstMatch = el;
    });
    if (firstMatch && firstMatch !== scrolledTo) {
      firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
      scrolledTo = firstMatch;
    }
    if (!q) scrolledTo = null;
  });
}

let currentWord = null;

function openPanel(word) {
  currentWord = word;
  renderDomainList(word);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('panel').scrollTop = 0;
}

function renderDomainList(word) {
  const cards = DATA[word] || [];
  const body = document.getElementById('panel-body');
  const items = cards.map((c, i) =>
    `<li onclick="showCard('${escapeAttr(word)}', ${i})">
       <span class="dname">${word} ${c.sep || 'и'} ${c.domain || '…'}</span>
       <span class="arrow">→</span>
     </li>`
  ).join('');
  body.innerHTML = `
    <h2>${word}</h2>
    <div class="hint">${cards.length} источников на эту тему</div>
    <ul id="domain-list">${items}</ul>
  `;
}

function showCard(word, index) {
  const c = (DATA[word] || [])[index];
  if (!c) return;
  const body = document.getElementById('panel-body');
  let linkHtml = '';
  if (c.link_url) {
    linkHtml = `<div><a href="${c.link_url}" target="_blank" rel="noopener">${c.link_text || 'Где почитать →'}</a></div>`;
  }
  body.innerHTML = `
    <button class="back-btn" onclick="renderDomainList('${escapeAttr(word)}')">${word}</button>
    <h2>${word} ${c.sep || 'и'} ${c.domain || ''}</h2>
    <div class="hint">&nbsp;</div>
    <div class="card" style="border-top:none;">
      ${c.material ? `<div class="material">${c.material}</div>` : ''}
      ${c.type ? `<div class="type">${c.type}</div>` : ''}
      ${c.about ? `<div class="about">${c.about}</div>` : ''}
      ${c.connection ? `<div class="connection">${c.connection}</div>` : ''}
      ${c.question ? `<div class="question">${c.question}</div>` : ''}
      ${linkHtml}
    </div>
  `;
  document.getElementById('panel').scrollTop = 0;
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'");
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentWord = null;
}

document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target.id === 'overlay') closePanel();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
});

buildWall();
setupSearch();
(function () {
  var params = new URLSearchParams(window.location.search);
  var w = params.get('word');
  if (w) { openPanel(w.toUpperCase()); }
})();
</script>

</body>
</html>
